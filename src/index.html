<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Reviewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 16px; color: #00d2ff; }
    textarea { width: 100%; height: 220px; background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 8px; padding: 12px; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; resize: vertical; }
    button { margin-top: 12px; padding: 10px 24px; background: #0f3460; color: #00d2ff; border: 1px solid #00d2ff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #00d2ff; color: #1a1a2e; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 8px; font-size: 13px; color: #aaa; min-height: 20px; }
    #results { margin-top: 16px; }
    .error-card { background: #16213e; border-left: 4px solid #e94560; border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; }
    .error-card .line { font-weight: 700; color: #e94560; }
    .error-card .type { display: inline-block; background: #e9456033; color: #e94560; padding: 1px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
    .error-card .desc { margin-top: 6px; color: #ccc; }
    .error-card .fix { margin-top: 6px; background: #0f3460; padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; color: #7ec8e3; }
    .error-card .fix-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .no-errors { color: #4ecca3; font-size: 15px; padding: 16px; }
    .model-error { color: #e94560; font-size: 14px; padding: 16px; background: #16213e; border-radius: 8px; border: 1px solid #e9456033; }
  </style>
</head>
<body>
  <h1>Code Reviewer</h1>
  <textarea id="code" placeholder="Paste code to review..."></textarea>
  <button id="analyzeBtn" onclick="analyze()">Find Errors</button>
  <div id="status"></div>
  <div id="results"></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    async function analyze() {
      const code = document.getElementById('code').value.trim();
      const status = document.getElementById('status');
      const results = document.getElementById('results');
      const btn = document.getElementById('analyzeBtn');

      if (!code) {
        status.textContent = 'Please enter some code to analyze.';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Analyzing...';
      results.innerHTML = '';

      try {
        const response = await invoke('analyze_code', { code });

        if (response.ok) {
          const errors = response.errors;
          if (errors.length === 0) {
            results.innerHTML = '<div class="no-errors">No errors found. Code looks good!</div>';
            status.textContent = '';
          } else {
            status.textContent = `Found ${errors.length} error(s):`;
            results.innerHTML = errors.map(e => `
              <div class="error-card">
                <div>
                  <span class="line">Line ${e.line}</span>
                  <span class="type">${escapeHtml(e.type)}</span>
                </div>
                <div class="desc">${escapeHtml(e.description)}</div>
                <div class="fix-label">Suggested fix:</div>
                <div class="fix">${escapeHtml(e.fix)}</div>
              </div>
            `).join('');
          }
        } else {
          status.textContent = '';
          results.innerHTML = `<div class="model-error">${escapeHtml(response.error)}</div>`;
        }
      } catch (err) {
        status.textContent = '';
        results.innerHTML = `<div class="model-error">Error: ${escapeHtml(String(err))}</div>`;
      } finally {
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
